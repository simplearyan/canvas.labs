<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <defs>
    <!-- CapCut v2 Accent Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ca8ff" />
      <stop offset="100%" stop-color="#5c80ff" />
    </linearGradient>
    
    <!-- Premium Fonts Setup -->
    <style>
      .monogram-text {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 900;
        fill: #ffffff;
      }
      .brand-bold {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 700;
        fill: #ffffff;
      }
      .brand-light {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 300;
        fill: #a1a1aa;
      }
    </style>
  </defs>

  <!-- Group containing whole logo lockup -->
  <g transform="translate(12, 12)">
    <!-- 1. App Icon Box (96x96px) in CapCut Matte Charcoal -->
    <rect x="0" y="0" width="96" height="96" rx="20" fill="#1e1e1e" stroke="#3a3a3a" stroke-width="2" />
    
    <!-- Monogram letters 'CL' -->
    <text x="48" y="58" font-size="40" letter-spacing="-2" text-anchor="middle" class="monogram-text">CL</text>
    
    <!-- Accent Dot (24x24px) -->
    <circle cx="82" cy="82" r="16" fill="#111111" />
    <circle cx="82" cy="82" r="12" fill="url(#blueGrad)" />
    
    <!-- 2. Brand Typography (Tailored for dark layouts) -->
    <g transform="translate(120, 48)">
      <text x="0" y="16" font-size="48" letter-spacing="-1">
        <tspan class="brand-bold">Canvas</tspan>
        <tspan class="brand-light">Labs</tspan>
      </text>
    </g>
  </g>
</svg>
