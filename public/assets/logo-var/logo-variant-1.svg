<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <defs>
    <!-- Accent Dot Gradient -->
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Premium Fonts Setup -->
    <style>
      .monogram-text {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 900;
        fill: #ffffff;
      }
      .brand-bold {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 700;
        fill: #111827;
      }
      .brand-light {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 300;
        fill: #4b5563;
      }
    </style>
  </defs>

  <!-- Group containing whole logo lockup with vertical centering -->
  <g transform="translate(12, 12)">
    <!-- 1. App Icon Box (96x96px) -->
    <rect x="0" y="0" width="96" height="96" rx="20" fill="#111827" />
    
    <!-- Monogram letters 'CL' centered in icon box -->
    <text x="48" y="58" font-size="40" letter-spacing="-2" text-anchor="middle" class="monogram-text">CL</text>
    
    <!-- Accent Dot (24x24px) at bottom right -->
    <!-- Background circle for border stroke/spacing offset -->
    <circle cx="82" cy="82" r="16" fill="#ffffff" />
    <!-- Glowing Accent Dot itself -->
    <circle cx="82" cy="82" r="12" fill="url(#dotGrad)" />
    
    <!-- 2. Brand Typography next to it -->
    <g transform="translate(120, 48)">
      <!-- Text vertical alignment offset -->
      <text x="0" y="16" font-size="48" letter-spacing="-1">
        <tspan class="brand-bold">Canvas</tspan>
        <tspan class="brand-light">Labs</tspan>
      </text>
    </g>
  </g>
</svg>
