<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <defs>
    <!-- Cyan to Green Neon Stroke Gradient -->
    <linearGradient id="neonStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Neon Pink Accent Dot Gradient -->
    <linearGradient id="pinkDotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Premium Fonts Setup -->
    <style>
      .monogram-text {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 900;
        fill: #22d3ee;
        filter: url(#neonGlow);
      }
      .brand-bold {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 700;
        fill: #22d3ee;
        filter: url(#neonGlow);
      }
      .brand-light {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 300;
        fill: #34d399;
        filter: url(#neonGlow);
      }
    </style>
  </defs>

  <!-- Group containing whole logo lockup -->
  <g transform="translate(12, 12)">
    <!-- 1. App Icon Box (96x96px) in Cyber Black and Neon Gradient Stroke -->
    <rect x="0" y="0" width="96" height="96" rx="20" fill="#050505" stroke="url(#neonStroke)" stroke-width="2" />
    
    <!-- Monogram letters 'CL' -->
    <text x="48" y="58" font-size="40" letter-spacing="-2" text-anchor="middle" class="monogram-text">CL</text>
    
    <!-- Accent Dot (24x24px) -->
    <circle cx="82" cy="82" r="16" fill="#050505" />
    <circle cx="82" cy="82" r="12" fill="url(#pinkDotGrad)" filter="url(#neonGlow)" />
    
    <!-- 2. Brand Typography -->
    <g transform="translate(120, 48)">
      <text x="0" y="16" font-size="48" letter-spacing="-1">
        <tspan class="brand-bold">Canvas</tspan>
        <tspan class="brand-light">Labs</tspan>
      </text>
    </g>
  </g>
</svg>
