<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Cyan Accent Dot Gradient -->
    <linearGradient id="cyanDotDef" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    
    <style>
      .monogram {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 900;
        fill: #1f2937;
      }
    </style>
  </defs>

  <!-- Clean Tech White Squircle -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" />

  <!-- Monogram text 'CL' -->
  <text x="64" y="78" font-size="48" letter-spacing="-3" text-anchor="middle" class="monogram">CL</text>

  <!-- Accent Dot (Cyan) -->
  <circle cx="102" cy="102" r="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
  <circle cx="102" cy="102" r="13" fill="url(#cyanDotDef)" />
</svg>
