<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Purple Gradient Accent Dot -->
    <linearGradient id="dotDef" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <style>
      .monogram {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 900;
        fill: #ffffff;
      }
    </style>
  </defs>

  <!-- Squircle App Icon Base -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="#111827" />

  <!-- Monogram text 'CL' -->
  <text x="64" y="78" font-size="64" letter-spacing="-3" text-anchor="middle" class="monogram">CL</text>

  <!-- Accent Dot (Violet) at bottom right -->
  <!-- <circle cx="102" cy="102" r="18" fill="#ffffff" />
  <circle cx="102" cy="102" r="13" fill="url(#dotDef)" /> -->
</svg>
